# ============================================================
# bocik — Docker Compose (Linux server deployment)
# ============================================================

version: "3.8"

services:
  bot:
    build: .
    container_name: bocik
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    ports:
      - "8088:8088"   # Dashboard
    # Default: paper trading. Uncomment for live:
    # command: python orchestrator.py --mode live
